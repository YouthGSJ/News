<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berita Indonesia | Youth GMS</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#111;
    color:white;
}

header{
    background:#000;
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:#d4a017;
    font-size:24px;
    font-weight:700;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:20px;
}

.hero{
    text-align:center;
    padding:80px 20px;
}
nav a:hover{}
.hero h1{
    font-size:50px;
}

.hero span{
    color:#d4a017;
}

.hero p{
    margin-top:15px;
    color:#bdbdbd;
}

.news-container{
    width:90%;
    max-width:1200px;
    margin:auto;
    padding-bottom:80px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.news-card{
    background:#1b1b1b;
    border-radius:15px;
    overflow:hidden;
}

.news-card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.news-content{
    padding:20px;
}

.news-content h3{
    margin-bottom:10px;
}

.news-content p{
    color:#cfcfcf;
    margin-bottom:20px;
}

.btn{
    display:inline-block;
    background:#d4a017;
    color:black;
    text-decoration:none;
    padding:10px 16px;
    border-radius:8px;
    font-weight:600;
}

.loading{
    text-align:center;
    padding:50px;
    color:#ccc;
}

footer{
    text-align:center;
    padding:30px;
    background:#000;
    color:#888;
}

</style>
</head>
<body>

<header>
    <div class="logo">✝ Youth GSJ</div>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="berita.html">Berita</a>
    </nav>
</header>

<section class="hero">
    <h1>Berita <span>Indonesia</span></h1>
    <p>Informasi terbaru dari Indonesia yang diperbarui secara otomatis.</p>
</section>

<div id="loading" class="loading">
    Memuat berita...
</div>

<div id="news" class="news-container"></div>

</section>

<footer>
    © 2026 Youth Germita Syalom Jakarta
</footer>

<script>

const rss =
"https://www.kompas.com/rss";

fetch(
`https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rss)}`
)

.then(response => response.json())

.then(data => {

    document.getElementById('loading').style.display='none';

    let output='';

    data.items.slice(0,12).forEach(item=>{

        output += `
        <div class="news-card">

            <img src="${item.thumbnail || 'https://picsum.photos/600/400'}">

            <div class="news-content">

                <h3>${item.title}</h3>

                <p>
                    ${item.description.replace(/(<([^>]+)>)/gi,"").substring(0,120)}...
                </p>

                <a class="btn"
                   href="${item.link}"
                   target="_blank">
                   Baca Selengkapnya
                </a>

            </div>

        </div>
        `;

    });

    document.getElementById('news').innerHTML=output;

})

.catch(error=>{

    document.getElementById('loading').innerHTML=
    "Gagal memuat berita.";

});

</script>

</body>
</html>
