<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>News Youth GSJ</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:Poppins;
    background:#0f0f0f;
    color:white;
}

/* HEADER */
header{
    padding:20px 8%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#111;
}

header a{
    color:white;
    text-decoration:none;
    margin-left:15px;
    font-size:14px;
    opacity:0.8;
}

header a:hover{
    opacity:1;
}

/* GRID NEWS */
.container{
    padding:40px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

/* CARD */
.card{
    background:#1a1a1a;
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

.card-content{
    padding:15px;
}

.card h3{
    margin:0;
    font-size:18px;
}

.card p{
    font-size:13px;
    opacity:0.7;
}

/* DETAIL VIEW */
.detail{
    display:none;
    padding:40px 8%;
}

.detail img,
.detail iframe{
    width:100%;
    border-radius:12px;
    margin-top:15px;
}

.back{
    display:inline-block;
    margin-bottom:20px;
    cursor:pointer;
    color:#d39c2f;
}

/* ADMIN (HIDDEN) */
.admin{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.85);
    justify-content:center;
    align-items:center;
}

.admin-box{
    background:white;
    color:black;
    padding:20px;
    width:320px;
    border-radius:12px;
}

input,textarea{
    width:100%;
    margin:8px 0;
    padding:10px;
}

button{
    width:100%;
    padding:10px;
    background:#111;
    color:white;
    border:none;
    margin-top:5px;
}

/* FAB ADMIN BUTTON (hidden via URL) */
.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#d39c2f;
    padding:12px 18px;
    border-radius:50px;
    cursor:pointer;
    display:none;
}

</style>
</head>

<body>

<header>
    <h2>NEWS GSJ</h2>
    <div>
        <a href="file:///c%3A/Users/Erablue/OneDrive/Desktop/web%20pemuda/index%280%29.html">← Beranda</a>
    </div>
</header>

<!-- GRID -->
<div class="container" id="grid"></div>

<!-- DETAIL -->
<div class="detail" id="detail">
    <div class="back" onclick="back()">← Kembali</div>
    <h1 id="title"></h1>
    <img id="img">
    <iframe id="video" frameborder="0" allowfullscreen></iframe>
    <p id="content"></p>

    <button onclick="openAdmin()">Edit (Admin)</button>
</div>

<!-- ADMIN -->
<div class="admin" id="admin">
    <div class="admin-box">
        <h3>Edit News</h3>
        <input id="t">
        <input id="i">
        <input id="v" placeholder="YouTube embed link">
        <textarea id="c"></textarea>

        <button onclick="save()">Save</button>
        <button onclick="closeAdmin()">Close</button>
    </div>
</div>

<div class="fab" id="fab" onclick="openAdmin()">ADMIN</div>

<script>

/* ===== DATABASE ===== */
let db = JSON.parse(localStorage.getItem("newsDB")) || {
    natal:{
        title:"Natal Youth 2026",
        img:"Natal/natal.jpeg",
        video:"",
        content:"Perayaan Natal penuh sukacita bersama Youth GSJ"
    },
    retreat:{
        title:"Paskah 2026",
        img:"Paskah/paskah.jpeg",
        video:"",
        content:"Momen kebersamaan dalam hadirat Tuhan"
    },
    komsel:{
        title:"Mutasi Growth",
        img:"Pelayanan/mutasi.jpeg",
        video:"",
        content:"Belajar firman Tuhan lebih dalam"
    }
};

let currentId = null;

/* ===== RENDER GRID ===== */
function render(){
    let grid = document.getElementById("grid");
    grid.innerHTML="";

    Object.keys(db).forEach(id=>{
        let n = db[id];

        grid.innerHTML += `
        <div class="card" onclick="openNews('${id}')">
            <img src="${n.img}">
            <div class="card-content">
                <h3>${n.title}</h3>
                <p>${n.content.substring(0,80)}...</p>
            </div>
        </div>`;
    });
}

/* ===== OPEN NEWS ===== */
function openNews(id){
    currentId = id;
    let n = db[id];

    document.getElementById("grid").style.display="none";
    document.getElementById("detail").style.display="block";

    document.getElementById("title").innerText = n.title;
    document.getElementById("img").src = n.img;
    document.getElementById("content").innerText = n.content;

    if(n.video){
        document.getElementById("video").style.display="block";
        document.getElementById("video").src = n.video;
    }else{
        document.getElementById("video").style.display="none";
    }
}

/* ===== BACK ===== */
function back(){
    document.getElementById("grid").style.display="grid";
    document.getElementById("detail").style.display="none";
}

/* ===== ADMIN ===== */
function openAdmin(){
    document.getElementById("admin").style.display="flex";

    let n = db[currentId];

    document.getElementById("t").value = n.title;
    document.getElementById("i").value = n.img;
    document.getElementById("v").value = n.video;
    document.getElementById("c").value = n.content;
}

function closeAdmin(){
    document.getElementById("admin").style.display="none";
}

function save(){
    db[currentId] = {
        title:document.getElementById("t").value,
        img:document.getElementById("i").value,
        video:document.getElementById("v").value,
        content:document.getElementById("c").value
    };

    localStorage.setItem("newsDB", JSON.stringify(db));
    render();
    openNews(currentId);
    closeAdmin();
}

/* ===== ADMIN ACCESS VIA URL ===== */
const params = new URLSearchParams(location.search);
if(params.get("admin") === "gsj2026"){
    document.getElementById("fab").style.display="block";
}

/* INIT */
render();

</script>

</body>
</html>
